name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake sqlite3 libsqlite3-dev libcurl4-openssl-dev python3

    - name: Configure and Build
      run: |
        mkdir build
        cd build
        cmake ..
        make -j$(nproc)

    - name: Run Tests
      run: |
        cd build
        ctest --output-on-failure
